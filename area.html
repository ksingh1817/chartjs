 
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chartjs</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 0px;
      border-radius: 0;
      margin: 0;
    }
    #chart-container {
      width: 900px;              /* ✅ full width */
      max-width: 95%;
      height: auto;         
      min-height: 500px; /* ✅ FIXED HEIGHT (important) */
      margin:20px auto;
      background: #fff;
      padding:20px 5px 10px 5px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>


<div id="chart-container">
  <canvas id="myChart"></canvas>
</div>

<script>
async function loadChart() {
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
      datasets: [
        {
          label: 'Visitors',
          data: [30, 50, 40, 60, 70, 90, 100],
          borderColor: 'rgba(75, 192, 192, 1)',
          backgroundColor: 'rgba(75, 192, 192, 0.3)', // semi-transparent fill
          fill: true,   // enables area fill
          tension: 0.4  // smooth curve
        },
        {
          label: 'Subscribers',
          data: [20, 60, 77, 55, 65, 95, 120],
          borderColor: 'rgba(255, 99, 132, 1)',
          backgroundColor: 'rgba(255, 99, 132, 0.3)',
          fill: true,
          tension: 0.4
        }
      ]
    },
    options: {
      plugins: {
        title: {
          display: true,
          text: 'Website Growth (Area Chart)',
          font: {
            size: 18,
            weight: 'bold'
          }
        },
        legend: {
          position: 'top'
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              return context.dataset.label + ': ' + context.parsed.y;
            }
          }
        }
      },
      scales: {
        x: {
          title: {
            display: true,
            text: 'Months'
          }
        },
        y: {
          title: {
            display: true,
            text: 'Users'
          },
          beginAtZero: true
        }
      }
    }
  });
}

loadChart();
</script>

</body>
</html>
