<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chartjs</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 0px;
      border-radius: 0;
      margin: 0;
    }
    #chart-container {
      width: 900px;              /* ✅ full width */
      max-width: 95%;
      height: auto;         
      min-height: 500px; /* ✅ FIXED HEIGHT (important) */
      margin:20px auto;
      background: #fff;
      padding:20px 5px 10px 5px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div id="chart-container">
  <canvas id="horizontalBar"></canvas>
</div>

<script>
const ctx2 = document.getElementById('horizontalBar').getContext('2d');
new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: ['Red', 'Blue', 'Yellow', 'Green'],
        datasets: [{
            label: 'Scores',
            data: [10, 20, 30, 40],
            backgroundColor: 'rgba(54, 162, 235, 0.5)'
        }]
    },
    options: {
        indexAxis: 'y'
    }
});
</script>

</body>
</html>
