<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chartjs</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 0px;
      border-radius: 0;
      margin: 0;
    }
    #chart-container {
      width: 95%;
      max-width: 1000px;
      height: 550px; /* ✅ fixed height */
      margin: 20px auto;
      background: #ffffff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    @media (max-width: 600px) {
      #chart-container {
        height: 350px;  
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<div id="chart-container">
  <canvas id="myChart"></canvas>
</div>

<script>
async function loadChart() {
  // 1. Fetch data from API
 // const response = await fetch('https://api.example.com/data');
 // const result = await response.json();

 
  // Example API response:
  const result =  [
    { "month": "Jan", "valueA": 10, "valueB": 15 }, 
    { "month": "Feb", "valueA": 20, "valueB": 25 }, 
    { "month": "Mar", "valueA": 15, "valueB": 30 }, 
    { "month": "Apr", "valueA": 25, "valueB": 20 }, 
    { "month": "May", "valueA": 30, "valueB": 35 },  
    { "month": "Jun", "valueA": 20, "valueB": 40 }, 
    { "month": "Jul", "valueA": 35, "valueB": 30 }, 
    { "month": "Aug", "valueA": 40, "valueB": 45 }, 
    { "month": "Sep", "valueA": 30, "valueB": 25 }, 
    { "month": "Oct", "valueA": 25, "valueB": 20 }, 
    { "month": "Nov", "valueA": 15, "valueB": 10 }, 
    { "month": "Dec", "valueA": 20, "valueB": 15 }
  ];

  const labels = result.map(item => item.month);
 // const data = result.map(item => item.value);
  const dataA = result.map(item => item.valueA);
  const dataB = result.map(item => item.valueB);

  // 3. Create Chart
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',  
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Product A Sales( 2025)',
          data: dataA,
          borderColor: 'blue',
          fill: false,
          tension: 0.3
        },
        {
          label: 'Product B Sales( 2025)',
          data: dataB,
          borderColor: 'red',
          fill: false,
          tension: 0.3
        }
      ]
    },

    options: {
       responsive: true,
      maintainAspectRatio: false,

      plugins: {
      // ✅ Chart Title (Top)
      title: {
        display: true,
        text: '📊 Product Sales Comparison', 
        color: 'red',
        font: { size: 18, weight: 'bold',family: 'Arial' },
        padding: {bottom: 15}
      },

       // ✅ Dataset label (legend)
      legend: {
        display: true,
        position: 'top',
        labels: { 
          color: '#242424',
          font: {size: 14, weight: 'normal',family: 'Arial'},
        //  usePointStyle: true,
        //  pointStyle: 'circle',
        },
      },

 
        // ✅ tooltip styling
      tooltip: {
          backgroundColor: '#1f2937',
          titleColor: '#fff',
          bodyColor: '#fff',
          padding: 10,
          borderColor: '#ddd',
          borderWidth: 1,
          callbacks: {
            label: function(context) {
              return `${context.dataset.label} : ₹ ${context.raw} Cr`;
            }
          }
        }
      },
      scales: {
        // ✅ X-axis title
        x: {
          title: {
            display: true,
            text: 'Months 2025',
            color: 'black',
            font: {size: 16}
          }
        },
        // ✅ Y-axis title (value title)
        y: {
          title: {
            display: true,
            text: 'Revanue (CR)',
            color: 'black',
            font: {size: 16}
          },
          beginAtZero: true
        }
      },
 
    }

  });
}

loadChart();
</script>

</body>
</html>
