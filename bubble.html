 
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chartjs</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 0px;
      border-radius: 0;
      margin: 0;
    }
    #chart-container {
      width: 900px;              /* ✅ full width */
      max-width: 95%;
      height: auto;         
      min-height: 500px; /* ✅ FIXED HEIGHT (important) */
      margin:20px auto;
      background: #fff;
      padding:20px 5px 10px 5px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>


<div id="chart-container">
  <canvas id="myChart"></canvas>
</div>

<script>
async function loadChart() {
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bubble',
    data: {
      datasets: [
        {
          label: 'Dataset A',
          data: [
            { x: 5, y: 10, r: 10 },
            { x: 15, y: 25, r: 15 },
            { x: 25, y: 8, r: 20 },
            { x: 35, y: 18, r: 12 }
          ],
          backgroundColor: 'rgba(255, 99, 132, 0.6)'
        },
        {
          label: 'Dataset B',
          data: [
            { x: 10, y: 5, r: 8 },
            { x: 20, y: 15, r: 18 },
            { x: 30, y: 12, r: 10 },
            { x: 40, y: 20, r: 25 }
          ],
          backgroundColor: 'rgba(54, 162, 235, 0.6)'
        }
      ]
    },
    options: {
      plugins: {
        title: {
          display: true,
          text: 'Bubble Chart Example',
          font: {
            size: 18,
            weight: 'bold'
          }
        },
        legend: {
          position: 'top'
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              const x = context.raw.x;
              const y = context.raw.y;
              const r = context.raw.r;
              return '(' + x + ', ' + y + ') - size: ' + r;
            }
          }
        }
      },
      scales: {
        x: {
          title: {
            display: true,
            text: 'X Axis'
          }
        },
        y: {
          title: {
            display: true,
            text: 'Y Axis'
          }
        }
      }
    }
  });
}

loadChart();
</script>

</body>
</html>
