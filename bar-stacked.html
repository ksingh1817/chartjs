<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chartjs</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 0px;
      border-radius: 0;
      margin: 0;
    }
    #chart-container {
      width: 95%;
      max-width: 1000px;
      height: 550px; /* ✅ fixed height */
      margin: 20px auto;
      background: #ffffff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    @media (max-width: 600px) {
      #chart-container {
        height: 350px;  
        padding: 10px;
      }
    }
  </style>

</head>
<body>

<div id="chart-container">
  <canvas id="stackedBar"></canvas>
</div>

<script>
const ctx4 = document.getElementById('stackedBar').getContext('2d');
new Chart(ctx4, {
    type: 'bar',
    data: {
        labels: ['Q1', 'Q2', 'Q3', 'Q4'],
        datasets: [
            {
                label: 'Product A',
                data: [10, 20, 30, 40],
                backgroundColor: 'rgba(255, 99, 132, 0.5)'
            },
            {
                label: 'Product B',
                data: [15, 25, 35, 45],
                backgroundColor: 'rgba(54, 162, 235, 0.5)'
            }
        ]
    },
    options: {
        scales: {
            x: { stacked: true },
            y: { stacked: true }
        }
    }
});
</script>

</body>
</html>
