<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chartjs</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<canvas id="myChart"></canvas>

<script>
async function loadChart() {
  // 1. Fetch data from API
 // const response = await fetch('https://api.example.com/data');
 // const result = await response.json();

 
  // Example API response:
   const result =  [
    { "month": "Jan", "value": 10 }, 
    { "month": "Feb", "value": 20 }, 
    { "month": "Mar", "value": 15 }, 
    { "month": "Apr", "value": 25 }, 
    { "month": "May", "value": 30 },  
    { "month": "Jun", "value": 20 }, 
    { "month": "Jul", "value": 35 }, 
    { "month": "Aug", "value": 40 }, 
    { "month": "Sep", "value": 30 }, 
    { "month": "Oct", "value": 25 }, 
    { "month": "Nov", "value": 15 }, 
    { "month": "Dec", "value": 20 }
  ]

  const labels = result.map(item => item.month);
  const data = result.map(item => item.value);

  // 3. Create Chart
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',  
    data: {
      labels: labels,
      datasets: [{
        label: 'Sales over Time 2025',
        data: data,
        borderColor: 'blue',
        fill: false
      }]
    }
  });
}

loadChart();
</script>

</body>
</html>
